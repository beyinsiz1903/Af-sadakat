name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-project:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: omni_inbox_hub
      JWT_SECRET: test-secret
      REACT_APP_BACKEND_URL: http://localhost:8000
      CI: false

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend paketlerini kur
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Python dosyalarını kontrol et
        run: |
          python -m compileall backend tests

      - name: Python testlerini çalıştır
        run: |
          if [ -d tests ]; then pytest -q; else echo "tests klasörü yok, test atlandı."; fi

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Yarn kur
        run: npm install -g yarn

      - name: Frontend paketlerini kur
        run: |
          cd frontend
          yarn install --frozen-lockfile

      - name: Frontend build al
        run: |
          cd frontend
          yarn build
